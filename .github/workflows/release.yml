name: Release
on:
  push:
    tags: ["v*"]
jobs:
  publish:
    runs-on: ubuntu-latest
    environment: CI-CD
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm ci
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION - refusing to publish"
            exit 1
          fi
      - name: Skip if version already published
        id: check
        run: |
          PKG_NAME="$(node -p "require('./package.json').name")"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "$PKG_NAME@$PKG_VERSION already on npm - skipping publish"
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.check.outputs.published == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      # Mirror to GitHub Packages so the repo's Packages section lists releases.
      # The GH npm registry requires the scope to match the repo owner, so the
      # package is renamed to @devs-30/... for this publish only.
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: "https://npm.pkg.github.com"
      - name: Skip if version already on GitHub Packages
        id: check-gpr
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if npm view "@devs-30/local-deep-researcher@$PKG_VERSION" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "@devs-30/local-deep-researcher@$PKG_VERSION already on GitHub Packages - skipping publish"
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - if: steps.check-gpr.outputs.published == 'false'
        name: Publish to GitHub Packages
        run: |
          npm pkg set name="@devs-30/local-deep-researcher"
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
